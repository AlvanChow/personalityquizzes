name: Apply Supabase migrations (one-time)

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-supabase-migrations.yml

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Validate and apply committed migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate and apply migrations
        id: migrate
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +e
          status=unknown_failure
          exit_code=1

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            status=missing_supabase_access_token
            exit_code=64
          elif [ -z "$SUPABASE_DB_PASSWORD" ]; then
            status=missing_supabase_db_password
            exit_code=65
          else
            supabase link --project-ref ivptkiuhxzdhjnslzalv --password "$SUPABASE_DB_PASSWORD"
            link_code=$?

            if [ "$link_code" -ne 0 ]; then
              status=project_link_failed
              exit_code=$link_code
            else
              echo "Migration state before push:"
              supabase migration list

              echo "Dry run:"
              supabase db push --dry-run --yes
              dry_run_code=$?

              if [ "$dry_run_code" -ne 0 ]; then
                status=migration_dry_run_failed
                exit_code=$dry_run_code
              else
                echo "Applying migrations:"
                supabase db push --yes
                push_code=$?

                if [ "$push_code" -eq 0 ]; then
                  echo "Migration state after push:"
                  supabase migration list
                  verify_code=$?

                  if [ "$verify_code" -eq 0 ]; then
                    status=migrations_applied
                    exit_code=0
                  else
                    status=migration_verification_failed
                    exit_code=$verify_code
                  fi
                else
                  status=migration_push_failed
                  exit_code=$push_code
                fi
              fi
            fi
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Record migration result
        if: always()
        uses: actions/github-script@v7
        env:
          MIGRATION_STATUS: ${{ steps.migrate.outputs.status }}
          MIGRATION_EXIT_CODE: ${{ steps.migrate.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = process.env.MIGRATION_STATUS || 'workflow_error'
            const exitCode = process.env.MIGRATION_EXIT_CODE || 'unknown'
            const body = JSON.stringify({
              status,
              exit_code: exitCode,
              source_sha: context.sha,
              run_id: context.runId,
              recorded_at: new Date().toISOString()
            }, null, 2) + '\n'
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/supabase-migration-status.json',
              message: `chore: record Supabase migration status (${status})`,
              content: Buffer.from(body).toString('base64'),
              branch: 'main'
            })

      - name: Mark unsuccessful migration
        if: steps.migrate.outputs.exit_code != '0'
        run: exit 1
