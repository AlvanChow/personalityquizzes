<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF8A5C" />

    <title>My Personality Quizzes — Discover Who You Really Are</title>
    <meta name="description" content="Take the Big 5, MBTI, Enneagram, and more fun personality quizzes. Discover your unique traits, track your results, and share with friends." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mypersonalityquizzes.com/" />
    <meta property="og:title" content="My Personality Quizzes — Discover Who You Really Are" />
    <meta property="og:description" content="Take the Big 5, MBTI, Enneagram, and more fun personality quizzes. Discover your unique traits and share with friends." />
    <meta property="og:image" content="https://mypersonalityquizzes.com/og-image.png" />
    <meta property="og:site_name" content="My Personality Quizzes" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mypersonalityquizzes.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="My Personality Quizzes — Discover Who You Really Are" />
    <meta name="twitter:description" content="Take the Big 5, MBTI, Enneagram, and more fun personality quizzes. Discover your unique traits and share with friends." />
    <meta name="twitter:image" content="https://mypersonalityquizzes.com/og-image.png" />

    <!-- Favicon: emoji sparkles -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />

    <!-- Fonts are self-hosted (Space Grotesk + Source Serif 4) and bundled via Vite. -->
    <script>
      // Apply saved/system theme before first paint to avoid a flash.
      (function () {
        try {
          // Dark is the default. Only a light choice saved under the CURRENT
          // preference scheme opts out — any older/stale preference (e.g. a
          // light flip from before dark became the default) is ignored so
          // every returning visitor re-lands in dark, as intended.
          var THEME_SCHEME = '2';
          var scheme = localStorage.getItem('pq_theme_v');
          var pref = localStorage.getItem('pq_theme');
          if (!(scheme === THEME_SCHEME && pref === 'light')) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) { /* storage unavailable */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
